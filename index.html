<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>OVFC Terminology Trainer</title>
<style>
  :root{
    --bg:#0f1720; --panel:#16212e; --panel2:#1d2b3a; --ink:#eef4fb; --muted:#9fb2c6;
    --line:#2a3a4d; --red:#e23b3b; --blue:#2f6fe0; --good:#26c281; --bad:#f0a32a;
    --accent:#39b0ff;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:var(--bg); color:var(--ink);
    font:15px/1.45 system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
    -webkit-text-size-adjust:100%;
  }
  .app{display:flex;flex-direction:column;height:100dvh;height:100vh}
  header{
    display:flex;align-items:center;gap:10px;padding:10px 14px;
    background:linear-gradient(90deg,#13202e,#172b3f);border-bottom:1px solid var(--line);
    flex:0 0 auto;
  }
  header .logo{width:26px;height:26px;border-radius:6px;background:radial-gradient(circle at 30% 30%,#fff,#cfe);position:relative;flex:0 0 auto}
  header .logo::after{content:"";position:absolute;inset:5px;border-radius:50%;
    background:
      radial-gradient(circle at 50% 50%,#111 2.4px,transparent 2.5px),
      radial-gradient(circle at 18% 30%,#111 1.6px,transparent 1.7px),
      radial-gradient(circle at 82% 30%,#111 1.6px,transparent 1.7px),
      radial-gradient(circle at 24% 78%,#111 1.6px,transparent 1.7px),
      radial-gradient(circle at 76% 78%,#111 1.6px,transparent 1.7px);}
  header h1{font-size:16px;margin:0;font-weight:700;letter-spacing:.2px}
  header .sub{color:var(--muted);font-size:12px;margin-left:2px}
  header .spacer{flex:1}
  header .teamcolors{display:flex;gap:14px;font-size:12px;color:var(--muted)}
  header .teamcolors label{display:flex;align-items:center;gap:6px;cursor:pointer}
  header .teamcolors input[type=color]{-webkit-appearance:none;appearance:none;border:none;background:none;
    width:24px;height:24px;border-radius:6px;padding:0;cursor:pointer}
  header .teamcolors input[type=color]::-webkit-color-swatch-wrapper{padding:0}
  header .teamcolors input[type=color]::-webkit-color-swatch{border:2px solid #0c161f;border-radius:6px}
  header .teamcolors input[type=color]::-moz-color-swatch{border:2px solid #0c161f;border-radius:6px}

  .body{flex:1 1 auto;display:grid;grid-template-columns:248px 1fr;min-height:0}

  /* sidebar */
  .sidebar{background:var(--panel);border-right:1px solid var(--line);overflow-y:auto;padding:10px}
  .search{width:100%;padding:8px 10px;border-radius:8px;border:1px solid var(--line);
    background:var(--panel2);color:var(--ink);font-size:14px;margin-bottom:8px}
  .grouphdr{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);
    margin:12px 4px 6px}
  .termbtn{display:block;width:100%;text-align:left;border:1px solid transparent;background:transparent;
    color:var(--ink);padding:8px 10px;border-radius:8px;cursor:pointer;font-size:14px;margin-bottom:2px}
  .termbtn:hover{background:var(--panel2)}
  .termbtn.active{background:#23415f;border-color:#356ea3}
  /* mobile term dropdown — hidden on desktop, shown in the mobile media query */
  .termselect{display:none;width:100%;padding:9px 10px;border-radius:8px;border:1px solid var(--line);
    background:var(--panel2);color:var(--ink);font-size:15px}

  /* content */
  .content{display:flex;flex-direction:column;min-height:0;min-width:0}
  .def{padding:12px 16px;border-bottom:1px solid var(--line);background:var(--panel)}
  .def h2{margin:0;font-size:20px}
  .def p{margin:4px 0 0;color:var(--muted);font-size:14px}

  .tabs{display:flex;gap:6px;flex-wrap:wrap;padding:10px 16px 0}
  .tab{border:1px solid var(--line);background:var(--panel2);color:var(--ink);padding:6px 12px;
    border-radius:999px;cursor:pointer;font-size:13px;font-weight:600;white-space:nowrap}
  .tab .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;vertical-align:middle}
  .tab.bad{border-color:#5a4420}.tab.bad.active{background:#4a3411;border-color:var(--bad)}
  .tab.good{border-color:#1f5a44}.tab.good.active{background:#11402c;border-color:var(--good)}

  .stage{position:relative;flex:1 1 auto;min-height:0;margin:10px 16px 0;border-radius:12px;
    overflow:hidden;background:#0b141d;border:1px solid var(--line)}
  canvas{position:absolute;inset:0;width:100%;height:100%;display:block;touch-action:none}
  /* hidden debug inspector */
  .debugpanel{position:absolute;top:8px;left:8px;z-index:5;display:none;
    background:rgba(8,14,20,.92);border:1px solid var(--accent);border-radius:8px;padding:8px 10px;
    font:12px/1.5 ui-monospace,Menlo,Consolas,monospace;color:#cfe;max-width:250px;white-space:pre;pointer-events:none}
  .stage.debug .debugpanel{display:block}
  .stage.debug canvas{cursor:crosshair}
  .anno{position:absolute;left:50%;bottom:12px;transform:translateX(-50%);max-width:min(620px,92%);
    background:rgba(10,18,26,.86);border:1px solid var(--line);backdrop-filter:blur(3px);
    color:#fff;padding:9px 14px;border-radius:10px;font-size:15px;text-align:center;line-height:1.35;
    box-shadow:0 6px 22px rgba(0,0,0,.45);opacity:0;transition:opacity .15s;pointer-events:none}
  .anno.top{bottom:auto;top:12px}              /* sit opposite the goal so it never covers the action */
  .anno.show{opacity:1}
  .anno .badge{display:inline-block;font-size:10px;font-weight:800;letter-spacing:.08em;
    padding:2px 7px;border-radius:999px;margin-right:8px;vertical-align:middle}
  .anno.badbadge .badge{background:var(--bad);color:#1a1206}
  .anno.goodbadge .badge{background:var(--good);color:#04210f}

  /* controls */
  .controls{flex:0 0 auto;display:flex;align-items:center;gap:12px;padding:10px 16px;flex-wrap:wrap}
  .btn{appearance:none;border:1px solid var(--line);background:var(--panel2);color:var(--ink);
    width:42px;height:42px;border-radius:10px;cursor:pointer;font-size:18px;display:grid;place-items:center;flex:0 0 auto}
  .btn:hover{background:#26384b}
  .scrubwrap{flex:1 1 220px;display:flex;align-items:center;gap:8px;min-width:160px}
  .time{font-variant-numeric:tabular-nums;color:var(--muted);font-size:12px;flex:0 0 auto;min-width:74px;text-align:right}
  .speed{display:flex;align-items:center;gap:8px;flex:0 0 auto;color:var(--muted);font-size:13px}
  input[type=range]{-webkit-appearance:none;appearance:none;height:6px;border-radius:6px;
    background:#2a3a4d;outline:none;cursor:pointer}
  input[type=range].scrub{flex:1}
  input[type=range].spd{width:118px}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;
    background:var(--accent);border:2px solid #0c161f;box-shadow:0 1px 4px rgba(0,0,0,.5)}
  input[type=range]::-moz-range-thumb{width:18px;height:18px;border:2px solid #0c161f;border-radius:50%;background:var(--accent)}

  .desc{flex:0 0 auto;padding:0 16px 14px;color:var(--muted);font-size:13.5px;max-height:22vh;overflow:auto}
  .desc .vtitle{color:var(--ink);font-weight:700;margin-right:6px}

  /* mobile: dropdown term picker + deterministic row heights so the pitch never resizes
     between terms (its box is the leftover space, so the other rows must be constant) */
  @media (max-width:780px){
    .body{grid-template-columns:1fr;grid-template-rows:auto 1fr}
    .sidebar{border-right:none;border-bottom:1px solid var(--line);overflow:visible;padding:8px 10px}
    #termlist,.search{display:none}        /* hide the desktop list + search on phone */
    .termselect{display:block}             /* show the dropdown */
    header .teamcolors{gap:10px}
    .def{padding:10px 14px}
    .def h2{font-size:18px}
    /* clamp AND reserve exactly 2 lines so def height is constant across terms (stable pitch) */
    .def p{margin-top:3px;display:-webkit-box;-webkit-line-clamp:2;line-clamp:2;-webkit-box-orient:vertical;
      overflow:hidden;min-height:2.9em;line-height:1.45}
    .tabs{flex-wrap:nowrap;overflow-x:auto;padding-bottom:2px}   /* single row, never wraps */
    .tab{flex:0 0 auto}
    .stage{margin:8px 10px 0}
    .controls{padding:9px 12px;gap:10px}
    .desc{padding:8px 14px 12px;height:74px;max-height:none}     /* fixed height → stable stage */
  }
  @media (max-width:480px){
    .speed .lbl{display:none}
    .time{min-width:0}
    header .teamcolors .cap{display:none}
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo"></div>
    <h1>OVFC Terminology Trainer</h1>
    <span class="sub">trigger words, shown on the pitch</span>
    <span class="spacer"></span>
    <div class="teamcolors">
      <label title="Our team colour"><input type="color" id="colUs"><span class="cap">Our team</span></label>
      <label title="Their team colour"><input type="color" id="colThem"><span class="cap">Their team</span></label>
    </div>
  </header>

  <div class="body">
    <nav class="sidebar" id="sidebar">
      <input class="search" id="search" placeholder="Search terms…" autocomplete="off">
      <select class="termselect" id="termSelect" aria-label="Choose a term"></select>
      <div id="termlist"></div>
    </nav>

    <main class="content">
      <div class="def">
        <h2 id="termName">—</h2>
        <p id="termDef"></p>
      </div>
      <div class="tabs" id="tabs"></div>
      <div class="stage" id="stage">
        <canvas id="cv"></canvas>
        <div class="debugpanel" id="debugPanel"></div>
        <div class="anno" id="anno"><span class="badge"></span><span id="annoText"></span></div>
      </div>
      <div class="controls">
        <button class="btn" id="restart" title="Restart">⏮</button>
        <button class="btn" id="prevStage" title="Previous step">⏪</button>
        <button class="btn" id="play" title="Play / Pause">▶</button>
        <button class="btn" id="nextStage" title="Next step">⏩</button>
        <div class="scrubwrap">
          <input type="range" class="scrub" id="scrub" min="0" max="1" step="0.001" value="0">
          <span class="time" id="time">0.0 / 0.0s</span>
        </div>
        <div class="speed">
          <span class="lbl">Speed</span>
          <input type="range" class="spd" id="speed" min="0.25" max="2" step="0.05" value="1">
          <span id="speedVal" style="min-width:34px">1.0×</span>
        </div>
      </div>
      <div class="desc" id="desc"></div>
    </main>
  </div>
</div>

<script>
/* ============================================================ DATA ===========
   Coordinate convention (pitch space, normalized 0..1):
     x : 0 = left touchline, 1 = right touchline
     y : 0 = the goal the ATTACKERS are attacking, 1 = far edge of the shown area
   The renderer flips for "defending" so the defended goal sits at the bottom.
   Authoring rule: only list an entity's pos when it MOVES; otherwise it holds.
   ball is kept ~0.02 from its carrier by hand (no attachment engine).
============================================================================== */
const G = (x,y)=>[x,y];
const TERMS = [
/* ---------------------------------------------------------------- DEFENDING */
{
  id:"touch-tight", name:"Touch Tight", group:"Defending",
  def:"A defender marks an attacker so closely there is virtually no space between them.",
  orientation:"defending", pitch:"two-thirds",
  variants:[
    { kind:"INCORRECT", title:"Standing off",
      desc:"The defender gives space — even backing off toward goal. The receiver controls easily, walks in, and scores.",
      throwIn:{side:"left",label:"Opponent Throw",until:1.4},
      entities:[{id:"gk",team:"blue",label:"GK",role:"keeper"},{id:"d1",team:"blue"},
        {id:"a1",team:"red"},{id:"a2",team:"red"},{id:"d2",team:"blue"},{id:"thr",team:"red"},{id:"ball",kind:"ball"}],
      keyframes:[
        {t:0,pos:{gk:G(.5,.06),d1:G(.42,.30),a1:G(.5,.42),a2:G(.80,.55),d2:G(.74,.48),thr:G(.02,.42),ball:G(.03,.42)}},
        {t:1.4,pos:{ball:G(.5,.44),thr:G(.10,.44)},ease:"linear"},
        {t:2.6,pos:{d1:G(.45,.20)}},
        {t:3.6,pos:{a1:G(.5,.30),ball:G(.5,.32)}},
        {t:4.8,pos:{a1:G(.46,.12),ball:G(.42,.02)},ease:"linear"}],
      pauses:[
        {t:0,text:"Opponent throw-in. Watch how far off the defender is.",point:"d1"},
        {t:1.4,text:"The receiver simply controls the ball — unpressured.",point:"a1"},
        {t:2.6,text:"The defender even backs off toward goal — far too much space.",point:"d1",shapes:[{type:"space",at:"a1",r:.12}]},
        {t:3.6,text:"Unmarked, the attacker walks the ball in…",point:"a1"},
        {t:4.8,text:"…and finishes hard into the left corner.",point:"a1"}] },
    { kind:"INCORRECT", title:"Marking the zone",
      desc:"The defender guards space, not the player. Once beaten they trail the attacker but can't keep up.",
      throwIn:{side:"left",label:"Opponent Throw",until:1.4},
      entities:[{id:"gk",team:"blue",label:"GK",role:"keeper"},{id:"d1",team:"blue"},
        {id:"a1",team:"red"},{id:"a2",team:"red"},{id:"d2",team:"blue"},{id:"thr",team:"red"},{id:"ball",kind:"ball"}],
      keyframes:[
        {t:0,pos:{gk:G(.5,.06),d1:G(.63,.35),a1:G(.5,.42),a2:G(.80,.55),d2:G(.74,.48),thr:G(.02,.42),ball:G(.03,.42)}},
        {t:1.4,pos:{ball:G(.5,.44),thr:G(.10,.44)},ease:"linear"},
        {t:2.8,pos:{a1:G(.40,.30),ball:G(.40,.32),d1:G(.55,.42)}},
        {t:4.2,pos:{a1:G(.44,.12),ball:G(.42,.05),d1:G(.50,.30)},ease:"linear"}],
      pauses:[
        {t:0,text:"The defender marks the ZONE, not the player.",point:"d1"},
        {t:1.4,text:"The attacker is left unmarked to receive.",point:"a1"},
        {t:2.8,text:"They trail the attacker — but a full step behind.",point:"d1",shapes:[{type:"run",from:"d1",to:"a1"}]},
        {t:4.2,text:"Can't catch up — the attacker drives in and scores.",point:"a1"}] },
    { kind:"CORRECT", title:"Touch tight",
      desc:"Goal-side and within a stride, between attacker and ball. The receiver gets no time and is forced backward.",
      throwIn:{side:"left",label:"Opponent Throw",until:1.4},
      entities:[{id:"gk",team:"blue",label:"GK",role:"keeper"},{id:"d1",team:"blue"},
        {id:"a1",team:"red"},{id:"a2",team:"red"},{id:"d2",team:"blue"},{id:"thr",team:"red"},{id:"ball",kind:"ball"}],
      keyframes:[
        {t:0,pos:{gk:G(.5,.06),d1:G(.5,.40),a1:G(.5,.44),a2:G(.80,.55),d2:G(.74,.48),thr:G(.02,.42),ball:G(.03,.42)}},
        {t:1.4,pos:{ball:G(.5,.50),thr:G(.10,.44)},ease:"linear"},
        {t:2.8,pos:{a1:G(.5,.54),ball:G(.5,.57),d1:G(.5,.49)}},
        {t:4.0,pos:{ball:G(.72,.58)}}],
      pauses:[
        {t:0,text:"Touch tight: a stride away, goal-side, between attacker and goal.",point:"d1"},
        {t:2.8,text:"No time, no space — the attacker can't turn and shields the ball.",point:"a1"},
        {t:4.0,text:"Forced backward. The attack is shut down.",point:"a1"}] }
  ]
},
{
  id:"press", name:"Press", group:"Defending",
  def:"Recognize the cue or trigger to press and win the ball.",
  orientation:"defending", pitch:"two-thirds",
  variants:[
    { kind:"INCORRECT", title:"Standing off",
      desc:"The attacker carries straight at goal and the defender just keeps backing off — never pressuring — gifting a clear strike.",
      entities:[{id:"gk",team:"blue",label:"GK",role:"keeper"},{id:"d1",team:"blue"},
        {id:"a1",team:"red"},{id:"a2",team:"red"},{id:"d2",team:"blue"},{id:"ball",kind:"ball"}],
      keyframes:[
        {t:0,pos:{gk:G(.5,.06),a1:G(.5,.68),ball:G(.5,.70),d1:G(.5,.52),a2:G(.26,.55),d2:G(.30,.45)}},
        {t:1.4,pos:{a1:G(.5,.54),ball:G(.5,.56),d1:G(.5,.40)}},
        {t:2.8,pos:{a1:G(.5,.40),ball:G(.5,.42),d1:G(.5,.26)}},
        {t:4.2,pos:{a1:G(.48,.22),ball:G(.42,.03)},ease:"linear"}],
      pauses:[
        {t:0,text:"The attacker has the ball and looks to drive at goal.",point:"a1"},
        {t:1.4,text:"The defender backs off instead of pressing.",point:"d1"},
        {t:2.8,text:"Still no pressure — backed right in toward goal.",point:"d1",shapes:[{type:"space",at:"a1",r:.11}]},
        {t:4.2,text:"Unpressured, the attacker strikes and scores.",point:"a1"}] },
    { kind:"CORRECT", title:"Press the trigger",
      desc:"The nearest defender presses on the right angle; the pressure forces a loose touch they win — while the second defender covers behind.",
      entities:[{id:"gk",team:"blue",label:"GK",role:"keeper"},{id:"d1",team:"blue"},
        {id:"a1",team:"red"},{id:"a2",team:"red"},{id:"d2",team:"blue"},{id:"ball",kind:"ball"}],
      keyframes:[
        {t:0,pos:{gk:G(.5,.06),a1:G(.5,.62),ball:G(.5,.64),d1:G(.5,.44),a2:G(.28,.52),d2:G(.40,.40)}},
        {t:1.2,pos:{d1:G(.5,.56),d2:G(.42,.47)}},
        {t:2.6,pos:{a1:G(.55,.66),ball:G(.60,.71),d1:G(.52,.60)},ease:"linear"},
        {t:3.8,pos:{ball:G(.58,.69),d1:G(.56,.67)}},
        {t:5.2,pos:{d1:G(.52,.82),ball:G(.52,.84)}}],
      pauses:[
        {t:0,text:"Trigger: the defender steps to press the player on the ball.",point:"d1"},
        {t:1.2,text:"They press; the second defender drops to COVER the forward pass.",point:"d2",shapes:[{type:"lane",from:"a1",to:"a2"}]},
        {t:2.6,text:"Pressure forces a heavy touch — the ball runs loose.",point:"a1",shapes:[{type:"space",at:"ball",r:.07}]},
        {t:3.8,text:"The defender capitalizes and wins it back.",point:"d1"},
        {t:5.2,text:"Now in possession, YOU carry it up the field.",point:"d1",shapes:[{type:"run",from:G(.56,.67),to:G(.52,.82)}]}] }
  ]
},
{
  id:"cover", name:"Cover", group:"Defending",
  def:"Support the player pressuring the ball by taking away the forward passing option.",
  orientation:"defending", pitch:"two-thirds",
  variants:[
    { kind:"INCORRECT", title:"Both dive in",
      desc:"The ball is wide left with a teammate free wide right. Both defenders pile onto the ball; an easy switch finds the free man, who scores.",
      entities:[{id:"gk",team:"blue",label:"GK",role:"keeper"},{id:"d1",team:"blue"},{id:"d2",team:"blue"},
        {id:"a1",team:"red"},{id:"a2",team:"red"},{id:"ball",kind:"ball"}],
      keyframes:[
        {t:0,pos:{gk:G(.5,.06),a1:G(.15,.55),ball:G(.15,.58),a2:G(.82,.62),d1:G(.30,.45),d2:G(.46,.45)}},
        {t:1.6,pos:{d1:G(.20,.52),d2:G(.28,.52),ball:G(.15,.55)}},
        {t:2.8,pos:{ball:G(.80,.55),a2:G(.80,.52)},ease:"linear"},
        {t:4.4,pos:{a2:G(.70,.16),ball:G(.68,.14),d1:G(.30,.46),d2:G(.40,.46)}}],
      pauses:[
        {t:0,text:"2 v 2. Ball wide left, a teammate free wide right.",point:"a2",shapes:[{type:"space",at:"a2",r:.1}]},
        {t:1.6,text:"Both defenders pile onto the ball — nobody covers.",point:"d2",shapes:[{type:"space",at:G(.55,.45),r:.12}]},
        {t:2.8,text:"An easy switch finds the free man on the right.",point:"ball",shapes:[{type:"lane",from:"a1",to:"a2"}]},
        {t:4.4,text:"They drive in and score; both defenders trail, out of position.",point:"a2"}] },
    { kind:"CORRECT", title:"Cover behind",
      desc:"First defender pressures; the second covers the forward pass and intercepts. Then, in possession, a teammate pushes wide to offer an outlet.",
      entities:[{id:"gk",team:"blue",label:"GK",role:"keeper"},{id:"d1",team:"blue"},{id:"d2",team:"blue"},
        {id:"a1",team:"red"},{id:"a2",team:"red"},{id:"ball",kind:"ball"}],
      keyframes:[
        {t:0,pos:{gk:G(.5,.06),a1:G(.40,.60),ball:G(.40,.63),a2:G(.62,.55),d1:G(.42,.45),d2:G(.60,.45)}},
        {t:1.4,pos:{d1:G(.42,.56),d2:G(.52,.40)}},
        {t:2.8,pos:{ball:G(.52,.47),d2:G(.51,.45),a1:G(.46,.52)}},
        {t:4.0,pos:{ball:G(.42,.32),d2:G(.43,.33),a1:G(.44,.42),a2:G(.55,.48)}},
        {t:5.4,pos:{d1:G(.13,.46),a1:G(.32,.44),a2:G(.46,.47)}},
        {t:6.4,pos:{ball:G(.17,.46),a1:G(.27,.45)},ease:"linear"}],
      pauses:[
        {t:0,text:"2 v 2. Watch the second defender.",point:"d2"},
        {t:1.4,text:"First pressures; second drops to COVER the forward lane.",point:"d2",shapes:[{type:"lane",from:"a1",to:"a2"}]},
        {t:2.8,text:"The through-ball runs to the covering defender — and the attacker steps toward YOU.",point:"d2"},
        {t:4.0,text:"Intercepted — now we have possession; the opponents only half-track, standing off.",point:"d2"},
        {t:5.4,text:"A teammate pushes to the wing to offer an outlet.",point:"d1",shapes:[{type:"run",from:G(.42,.56),to:G(.13,.46)}]},
        {t:6.4,text:"Played out wide past the loose pressure — our attack begins.",point:"d1"}] }
  ]
},
{
  id:"compact", name:"Compact", group:"Defending",
  def:"Get tight together as a unit to control time and space between the lines.",
  orientation:"defending", pitch:"two-thirds",
  variants:[
    { kind:"INCORRECT", title:"Stretched apart",
      desc:"A big gap opens between the back line and midfield. The attacker receives in the hole, turns, and attacks.",
      entities:[{id:"gk",team:"blue",label:"GK",role:"keeper"},{id:"d1",team:"blue"},{id:"d2",team:"blue"},
        {id:"m1",team:"blue"},{id:"a1",team:"red"},{id:"a2",team:"red"},{id:"ball",kind:"ball"}],

/* ========================================================== ENGINE =========== */
const easeInOut = t => t<.5 ? 2*t*t : 1-Math.pow(-2*t+2,2)/2;
const lerp = (a,b,t)=>a+(b-a)*t;

function compileVariant(v){
  const ids = v.entities.map(e=>e.id);
  const kfs = v.keyframes.slice().sort((a,b)=>a.t-b.t);
  // first explicit position for each entity (seed before its first move)
  const firstPos = {};
  for(const kf of kfs) for(const id in kf.pos) if(!firstPos[id]) firstPos[id]=kf.pos[id];
  const last = {}; for(const id of ids) last[id]=firstPos[id]||[0.5,0.5];
  // optional facing targets (for vision cones): same carry-forward model as pos
  const firstFace={}; for(const kf of kfs) if(kf.face) for(const id in kf.face) if(!firstFace[id]) firstFace[id]=kf.face[id];
  const lastFace={...firstFace};
  const frames = [];
  for(const kf of kfs){
    for(const id in kf.pos) last[id]=kf.pos[id];
    if(kf.face) for(const id in kf.face) lastFace[id]=kf.face[id];
    const snap = {}; for(const id of ids) snap[id]=last[id];
    const fsnap = {...lastFace};
    frames.push({t:kf.t,pos:snap,face:fsnap,ease:kf.ease||"easeInOut"});
    if(kf.hold){ const s2={}; for(const id of ids) s2[id]=last[id];
      frames.push({t:kf.t+kf.hold,pos:s2,face:{...lastFace},ease:"linear"}); }
  }
  const duration = frames.length?frames[frames.length-1].t:0;
  const pauses = (v.pauses||[]).slice().sort((a,b)=>a.t-b.t);
  return {variant:v,entities:v.entities,frames,duration,pauses};
}
// facing target [x,y] for an entity at time t, or null if it never has one
function sampleFace(comp,id,t){
  const F=comp.frames; if(!F.length || !F[0].face[id]) return null;
  if(t<=F[0].t) return F[0].face[id];
  if(t>=F[F.length-1].t) return F[F.length-1].face[id];
  for(let i=0;i<F.length-1;i++){
    if(t>=F[i].t && t<=F[i+1].t){
      const span=F[i+1].t-F[i].t||1e-6; let f=(t-F[i].t)/span;
      f=F[i+1].ease==="linear"?f:easeInOut(f);
      const a=F[i].face[id], b=F[i+1].face[id]; if(!a||!b) return a||b||null;
      return [lerp(a[0],b[0],f),lerp(a[1],b[1],f)];
    }
  }
  return F[F.length-1].face[id];
}
function samplePos(comp,id,t){
  if(S.debug && S.debugPos[id]) return S.debugPos[id];   // debug drag override (paused editing only)
  const F=comp.frames;
  if(!F.length) return [0.5,0.5];
  if(t<=F[0].t) return F[0].pos[id];
  if(t>=F[F.length-1].t) return F[F.length-1].pos[id];
  for(let i=0;i<F.length-1;i++){
    if(t>=F[i].t && t<=F[i+1].t){
      const span=F[i+1].t-F[i].t || 1e-6;
      let f=(t-F[i].t)/span;
      f = F[i+1].ease==="linear"?f:easeInOut(f);
      const a=F[i].pos[id], b=F[i+1].pos[id];
      return [lerp(a[0],b[0],f),lerp(a[1],b[1],f)];
    }
  }
  return F[F.length-1].pos[id];
}
const PAUSE_WIN = 0.14;
function pauseAt(comp,t){
  for(const p of comp.pauses) if(Math.abs(p.t-t)<PAUSE_WIN) return p;
  return null;
}

/* ----- team colours ("our team" / "their team", user-selectable, persisted) ----- */
const DEFAULT_COLORS = { us:"#2f6fe0", them:"#e23b3b" };   // our team = Blue, their team = Red
function loadColors(){ try{ const s=JSON.parse(localStorage.getItem("ovfc-colors")); if(s&&s.us&&s.them) return {us:s.us,them:s.them}; }catch(e){} return {...DEFAULT_COLORS}; }
function saveColors(){ try{ localStorage.setItem("ovfc-colors", JSON.stringify(S.colors)); }catch(e){} }
// A term's `orientation` says whether WE attack or defend, so "us" is the side that matches it.
function isUs(e){ return e.team === (S.term.orientation==="attacking" ? "red" : "blue"); }
function teamColorOf(e){ return isUs(e) ? S.colors.us : S.colors.them; }
// black or white text, whichever reads on the given fill colour
function readableOn(hex){ const c=hex.replace('#',''); const r=parseInt(c.slice(0,2),16),g=parseInt(c.slice(2,4),16),b=parseInt(c.slice(4,6),16);
  return (0.299*r+0.587*g+0.114*b)/255 > 0.62 ? "#10202e" : "#fff"; }

/* ----- playback state -----
   The scrub runs on a "play position" pp that INCLUDES the dwells: the timeline is built
   from alternating move-segments (pp↔t linear) and zero-width-in-t dwell-segments (length
   dwellBase) at each interior stage. Auto-play advances pp at real speed, so the thumb keeps
   gliding even while the players are held on a stage; pp→t derives the on-pitch position
   (frozen during a dwell). Forward/Back glide in t-space (motion-paced) toward the adjacent
   stage and park. dwellBase is test-overridable (0 ⇒ pp==t, linear). */
const EPS = 0.001;
const S = { term:null, vIndex:0, comp:null, t:0, pp:0, playing:false, speed:1, scrubbing:false,
  lastNow:null, colors:loadColors(), dwellBase:8, seekTarget:null,
  debug:false, sel:null, debugPos:{}, dragging:false };

function buildPP(comp){               // build the pp segment map using the current dwellBase
  const dur=comp.duration, db=S.dwellBase;
  const dwellTs=comp.pauses.map(p=>p.t).filter(t=>t>EPS && t<dur-EPS);
  const segs=[]; let pp=0, prevT=0;
  for(const dt of dwellTs){
    if(dt>prevT){ segs.push({type:'move',pp0:pp,pp1:pp+(dt-prevT),t0:prevT,t1:dt}); pp+=dt-prevT; }
    if(db>0){ segs.push({type:'dwell',pp0:pp,pp1:pp+db,t0:dt,t1:dt}); pp+=db; }
    prevT=dt;
  }
  segs.push({type:'move',pp0:pp,pp1:pp+Math.max(0,dur-prevT),t0:prevT,t1:dur}); pp+=Math.max(0,dur-prevT);
  comp.segs=segs; comp.ppTotal=pp||1e-6;
}
function segAt(comp,pp){ for(const s of comp.segs) if(pp<=s.pp1+1e-9) return s; return comp.segs[comp.segs.length-1]; }
function ppToT(comp,pp){
  pp=Math.max(0,Math.min(comp.ppTotal,pp));
  const s=segAt(comp,pp); if(s.type==='dwell') return s.t0;
  const f=(s.pp1-s.pp0)?(pp-s.pp0)/(s.pp1-s.pp0):0; return s.t0+f*(s.t1-s.t0);
}
function tToPp(comp,t){               // map a time to the pp where the playhead first reaches it
  t=Math.max(0,Math.min(comp.duration,t));
  for(const s of comp.segs){ if(s.type!=='move') continue;
    if(t<=s.t1+1e-9){ const f=(s.t1-s.t0)?(t-s.t0)/(s.t1-s.t0):0; return s.pp0+f*(s.pp1-s.pp0); } }
  return comp.ppTotal;
}
function playFrac(){ return S.comp&&S.comp.ppTotal ? S.pp/S.comp.ppTotal : 0; }

function loadVariant(term,vIndex){
  S.term=term; S.vIndex=vIndex; S.comp=compileVariant(term.variants[vIndex]);
  buildPP(S.comp);
  S.t=0; S.pp=0; S.playing=false; S.seekTarget=null; S.debugPos={}; S.sel=null;
  buildTabs(); updateDesc(); updatePlayBtn(); setScrubTicks(); render();
}
function play(){
  if(!S.comp) return;
  S.debugPos={};                                // discard any debug drags before moving
  if(S.pp>=S.comp.ppTotal-1e-6) S.pp=0;        // replay from start at the end
  S.seekTarget=null;
  const seg=segAt(S.comp,S.pp);                // if parked on a dwell, skip its hold so we move now
  if(seg.type==='dwell') S.pp=seg.pp1;
  S.t=ppToT(S.comp,S.pp); S.playing=true; updatePlayBtn();
}
function pause(){ S.playing=false; S.seekTarget=null; updatePlayBtn(); }
function togglePlay(){ S.playing?pause():play(); }
function tick(realDt){
  if(!S.playing || !S.comp) return;
  const vdt=realDt*S.speed;
  // Forward/Back: motion-paced glide in t-space to the target stage, then park
  if(S.seekTarget!=null){
    const dir = S.seekTarget>=S.t ? 1 : -1;
    let nt = S.t + dir*vdt;
    if((dir>0 && nt>=S.seekTarget) || (dir<0 && nt<=S.seekTarget)){ nt=S.seekTarget; S.seekTarget=null; S.playing=false; }
    S.t=Math.max(0,Math.min(S.comp.duration,nt)); S.pp=tToPp(S.comp,S.t); updatePlayBtn(); return;
  }
  // auto-play: advance pp (which includes dwell time) → gliding thumb; pp→t freezes on dwells
  S.pp+=vdt;
  if(S.pp>=S.comp.ppTotal){ S.pp=S.comp.ppTotal; S.playing=false; }
  S.t=ppToT(S.comp,S.pp);
}
function seekFraction(f){
  if(!S.comp) return;
  S.playing=false; S.seekTarget=null; S.debugPos={};
  S.pp=Math.max(0,Math.min(1,f))*S.comp.ppTotal; S.t=ppToT(S.comp,S.pp);
}
function nextStage(){          // animate forward to the next stage, then park
  if(!S.comp) return;
  S.debugPos={};
  const p=S.comp.pauses.find(p=>p.t>S.t+EPS);
  S.seekTarget = p ? p.t : S.comp.duration;
  S.playing=true; updatePlayBtn();
}
function prevStage(){          // animate back to the previous stage, then park
  if(!S.comp) return;
  S.debugPos={};
  let target=0;
  for(const p of S.comp.pauses){ if(p.t<S.t-EPS) target=p.t; else break; }
  S.seekTarget=target; S.playing=true; updatePlayBtn();
}
// sequence number with decimal between stages (1, 1.4, 2, …) for the debug panel
function seqNumber(){
  const ps=S.comp?S.comp.pauses:[]; if(!ps.length) return 0;
  let i=0; for(let k=0;k<ps.length;k++) if(ps[k].t<=S.t+EPS) i=k;
  let seq=i+1;
  if(i<ps.length-1){ const span=ps[i+1].t-ps[i].t||1e-6; seq=(i+1)+Math.min(1,Math.max(0,(S.t-ps[i].t)/span)); }
  return seq;
}

/* ========================================================== RENDER =========== */
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
const stageEl=document.getElementById('stage');
const annoEl=document.getElementById('anno'), annoText=document.getElementById('annoText');
let dpr=1, cssW=0, cssH=0, rect={x:0,y:0,w:0,h:0};

function resize(){
  dpr=Math.max(1,Math.min(3,window.devicePixelRatio||1));
  cssW=stageEl.clientWidth; cssH=stageEl.clientHeight;
  cv.width=Math.round(cssW*dpr); cv.height=Math.round(cssH*dpr);
  ctx.setTransform(dpr,0,0,dpr,0,0);
  computeRect(); render();
}
function computeRect(){
  const v=S.term?S.term.variants[S.vIndex]:null;
  const R = (S.term && S.term.pitch==="half")?1.0:1.2;     // field height:width
  const pad=18, gpad=22;                                    // gpad: room for goal beyond field
  const availW=Math.max(40,cssW-pad*2), availH=Math.max(40,cssH-gpad*2);
  let w=Math.min(availW,availH/R), h=w*R;
  rect={x:(cssW-w)/2, y:(cssH-h)/2, w, h};
}
function project(x,y){
  const yy = (S.term && S.term.orientation==="defending") ? (1-y) : y;
  return [rect.x+x*rect.w, rect.y+yy*rect.h];
}
function invProject(cx,cy){            // canvas px → pitch coords (inverse of project)
  let x=(cx-rect.x)/rect.w, yy=(cy-rect.y)/rect.h;
  const y=(S.term && S.term.orientation==="defending") ? 1-yy : yy;
  return [Math.max(0,Math.min(1,x)), Math.max(0,Math.min(1,y))];
}
function P(ref,t){ return Array.isArray(ref)?project(ref[0],ref[1]):(()=>{const p=samplePos(S.comp,ref,t);return project(p[0],p[1]);})(); }

function drawPitch(){
  const r=rect;
  // turf with mowing stripes
  ctx.save();
  ctx.beginPath(); ctx.rect(r.x,r.y,r.w,r.h); ctx.clip();
  const bands=7;
  for(let i=0;i<bands;i++){
    ctx.fillStyle = i%2? "#2f9e57":"#2b9350";
    ctx.fillRect(r.x, r.y+i*(r.h/bands), r.w, r.h/bands+1);
  }
  ctx.restore();
  ctx.lineWidth=2; ctx.strokeStyle="rgba(255,255,255,.9)";
  ctx.strokeRect(r.x,r.y,r.w,r.h);

  // goal-end markings (y=0 end). penalty + 6yd box, spot, arc.
  const line=(x1,y1,x2,y2)=>{const a=project(x1,y1),b=project(x2,y2);ctx.beginPath();ctx.moveTo(a[0],a[1]);ctx.lineTo(b[0],b[1]);ctx.stroke();};
  // penalty box
  line(.20,0,.20,.22); line(.80,0,.80,.22); line(.20,.22,.80,.22);
  // six-yard box
  line(.36,0,.36,.09); line(.64,0,.64,.09); line(.36,.09,.64,.09);
  // penalty spot
  const sp=project(.5,.15); ctx.fillStyle="#fff"; ctx.beginPath(); ctx.arc(sp[0],sp[1],2.5,0,7); ctx.fill();
  // D arc — only the portion OUTSIDE the penalty box (beyond the y=0.22 line) should show,
  // so clip to that region and stroke the full circle; it terminates exactly at the box.
  const c=project(.5,.15); const rr=Math.abs(project(.62,.15)[0]-c[0]);
  const yBox=project(.5,.22)[1], yFar=project(.5,1)[1];
  ctx.save();
  ctx.beginPath(); ctx.rect(rect.x, Math.min(yBox,yFar), rect.w, Math.abs(yFar-yBox)); ctx.clip();
  ctx.beginPath(); ctx.arc(c[0],c[1],rr,0,2*Math.PI); ctx.stroke();
  ctx.restore();
  const down = !(S.term && S.term.orientation==="defending"); // (still used by halfway arc)
  // far-edge halfway arc (two-thirds view)
  if(!S.term || S.term.pitch!=="half"){
    const hc=project(.5,1);
    ctx.beginPath(); ctx.arc(hc[0],hc[1],rr, down?1.15*Math.PI:0.15*Math.PI, down?1.85*Math.PI:0.85*Math.PI); ctx.stroke();
  }
  // goal frame (drawn beyond the line)
  const goalDepth=0.045;
  const gy = -goalDepth;
  const g1=project(.40,0), g2=project(.60,0), g3=project(.40,gy), g4=project(.60,gy);
  ctx.fillStyle="rgba(255,255,255,.25)"; ctx.strokeStyle="#fff"; ctx.lineWidth=2.5;
  ctx.beginPath();
  ctx.moveTo(g1[0],g1[1]);ctx.lineTo(g3[0],g3[1]);ctx.lineTo(g4[0],g4[1]);ctx.lineTo(g2[0],g2[1]);
  ctx.stroke();
  // net hatch
  ctx.save(); ctx.globalAlpha=.5; ctx.lineWidth=1; ctx.strokeStyle="#fff";
  for(let i=1;i<5;i++){const a=project(.40+.20*i/5,0),b=project(.40+.20*i/5,gy);ctx.beginPath();ctx.moveTo(a[0],a[1]);ctx.lineTo(b[0],b[1]);ctx.stroke();}
  ctx.restore();
}
function drawShapes(p){
  if(!p || !p.shapes) return; const t=S.t;
  ctx.save(); ctx.lineWidth=2.5; ctx.setLineDash([7,5]);
  for(const s of p.shapes){
    ctx.strokeStyle="rgba(255,221,71,.95)"; ctx.fillStyle="rgba(255,221,71,.16)";
    if(s.type==="space"){const c=P(s.at,t); const rr=(s.r||.08)*rect.w;
      ctx.beginPath(); ctx.arc(c[0],c[1],rr,0,7); ctx.fill(); ctx.stroke();}
    else if(s.type==="lane"){const a=P(s.from,t),b=P(s.to,t);
      ctx.beginPath();ctx.moveTo(a[0],a[1]);ctx.lineTo(b[0],b[1]);ctx.stroke();}
    else if(s.type==="run"){const a=P(s.from,t),b=P(s.to,t);
      ctx.beginPath();ctx.moveTo(a[0],a[1]);ctx.lineTo(b[0],b[1]);ctx.stroke();
      const ang=Math.atan2(b[1]-a[1],b[0]-a[0]),h=10; ctx.setLineDash([]);
      ctx.beginPath();ctx.moveTo(b[0],b[1]);
      ctx.lineTo(b[0]-h*Math.cos(ang-.4),b[1]-h*Math.sin(ang-.4));
      ctx.lineTo(b[0]-h*Math.cos(ang+.4),b[1]-h*Math.sin(ang+.4));
      ctx.closePath();ctx.fillStyle="rgba(255,221,71,.95)";ctx.fill();ctx.setLineDash([7,5]);}
  }
  ctx.restore();
}
function drawEntity(e){
  const pr=samplePos(S.comp,e.id,S.t), c=project(pr[0],pr[1]);
  const R=Math.max(11, rect.w*0.036);
  if(e.kind==="ball"){
    ctx.beginPath(); ctx.arc(c[0],c[1],R*0.46,0,7);
    ctx.fillStyle="#fff"; ctx.fill(); ctx.lineWidth=1.5; ctx.strokeStyle="#1a1a1a"; ctx.stroke();
    return;
  }
  const col = teamColorOf(e);
  const isFocus = S.term && FOCUS[S.term.id]===e.id;
  ctx.beginPath(); ctx.arc(c[0],c[1],R,0,7);
  ctx.fillStyle=col; ctx.fill();
  ctx.lineWidth=3; ctx.strokeStyle = e.role==="keeper"?"#ffe14d":"#fff"; ctx.stroke();
  if(isFocus){ ctx.lineWidth=2.5; ctx.strokeStyle="#fff"; ctx.beginPath(); ctx.arc(c[0],c[1],R+4,0,7); ctx.stroke(); }
  const lbl = isFocus ? "YOU" : e.label;
  if(lbl){ ctx.fillStyle=readableOn(col); ctx.font=`700 ${Math.round(R*(lbl.length>2?0.62:0.8))}px system-ui`;
    ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText(lbl,c[0],c[1]); }
}
function drawCallout(p){
  if(!p || !p.point) return;
  const pr=samplePos(S.comp,p.point,S.t), c=project(pr[0],pr[1]);
  const R=Math.max(11,rect.w*0.036);
  ctx.save(); ctx.lineWidth=3; ctx.strokeStyle="rgba(255,221,71,.95)"; ctx.setLineDash([4,4]);
  ctx.beginPath(); ctx.arc(c[0],c[1],R*1.7,0,7); ctx.stroke(); ctx.restore();
}
// 120° vision cone for entities flagged vision:true, pointing toward their facing target
function drawVision(){
  for(const e of S.comp.entities){
    if(!e.vision) continue;
    const ft=sampleFace(S.comp,e.id,S.t); if(!ft) continue;
    const pp=samplePos(S.comp,e.id,S.t);
    const pc=project(pp[0],pp[1]), tc=project(ft[0],ft[1]);
    const ang=Math.atan2(tc[1]-pc[1],tc[0]-pc[0]); if(!isFinite(ang)) continue;
    const half=(120*Math.PI/180)/2, rad=0.18*rect.w;
    ctx.save();
    // high-contrast cyan fill so it reads over the green turf
    const grd=ctx.createRadialGradient(pc[0],pc[1],4,pc[0],pc[1],rad);
    grd.addColorStop(0,"rgba(150,225,255,.62)"); grd.addColorStop(1,"rgba(120,205,255,0)");
    ctx.fillStyle=grd;
    ctx.beginPath(); ctx.moveTo(pc[0],pc[1]); ctx.arc(pc[0],pc[1],rad,ang-half,ang+half); ctx.closePath(); ctx.fill();
    // bright outline (two edges + far arc) for clear definition
    ctx.lineWidth=2; ctx.strokeStyle="rgba(220,245,255,.9)";
    ctx.beginPath(); ctx.moveTo(pc[0],pc[1]);
    ctx.lineTo(pc[0]+Math.cos(ang-half)*rad, pc[1]+Math.sin(ang-half)*rad);
    ctx.arc(pc[0],pc[1],rad,ang-half,ang+half);
    ctx.closePath(); ctx.stroke();
    ctx.restore();
  }
}
// small label above the ball during a throw-in restart
function drawThrowIn(){
  const v=S.term.variants[S.vIndex], ti=v.throwIn;
  if(!ti || S.t > (ti.until==null?Infinity:ti.until)) return;
  const bp=samplePos(S.comp,'ball',S.t), c=project(bp[0],bp[1]);
  const text=ti.label||"Throw-in";
  ctx.save(); ctx.font="600 12px system-ui"; ctx.textAlign="center"; ctx.textBaseline="middle";
  const w=ctx.measureText(text).width+16, h=20, x=Math.max(rect.x+w/2,Math.min(rect.x+rect.w-w/2,c[0])), y=c[1]-22;
  ctx.fillStyle="rgba(10,18,26,.85)"; ctx.strokeStyle="rgba(255,255,255,.4)"; ctx.lineWidth=1;
  ctx.beginPath(); ctx.roundRect(x-w/2,y-h/2,w,h,6); ctx.fill(); ctx.stroke();
  ctx.fillStyle="#fff"; ctx.fillText(text,x,y);
  ctx.restore();
}
function drawDebugSelection(){
  if(!S.sel) return;
  const p=samplePos(S.comp,S.sel,S.t), c=project(p[0],p[1]);
  const R=Math.max(11,rect.w*0.036);
  ctx.save(); ctx.lineWidth=2.5; ctx.strokeStyle="#ff3df0"; ctx.setLineDash([3,3]);
  ctx.beginPath(); ctx.arc(c[0],c[1],R+7,0,7); ctx.stroke(); ctx.restore();
}
function updateDebugPanel(){
  const L=[];
  L.push(`DEBUG · ${S.playing?"playing (pause to drag)":"paused"}`);
  L.push(`term ${S.term.id} v${S.vIndex} ${S.term.variants[S.vIndex].kind}`);
  L.push(`seq  ${seqNumber().toFixed(2)}  (t ${S.t.toFixed(2)}/${S.comp.duration.toFixed(2)})`);
  if(S.sel){
    const e=S.comp.entities.find(x=>x.id===S.sel);
    const p=samplePos(S.comp,S.sel,S.t);
    L.push(`sel  ${S.sel}${e&&e.team?" ["+e.team+"]":""}${FOCUS[S.term.id]===S.sel?" YOU":""}`);
    L.push(`pos  G(${p[0].toFixed(2)},${p[1].toFixed(2)})`);
    const ft=sampleFace(S.comp,S.sel,S.t);
    if(ft) L.push(`face G(${ft[0].toFixed(2)},${ft[1].toFixed(2)})`);
  } else { L.push(`tap a circle to select; drag to move`); }
  debugPanel.textContent=L.join("\n");
}
function render(){
  ctx.clearRect(0,0,cssW,cssH);
  if(!S.term){ return; }
  drawPitch();
  const dp = pauseAt(S.comp,S.t);
  drawVision();
  drawShapes(dp);
  for(const e of S.comp.entities) if(e.kind!=="ball") drawEntity(e);
  for(const e of S.comp.entities) if(e.kind==="ball") drawEntity(e);
  drawThrowIn();
  drawCallout(dp);
  if(S.debug){ drawDebugSelection(); updateDebugPanel(); }
  // annotation overlay + scrub/time
  const kind=S.term.variants[S.vIndex].kind;
  // place the banner at the end AWAY from the goal (goal is at bottom when defending)
  const topAnno = S.term.orientation==="defending" ? "top" : "";
  if(dp){ annoText.textContent=dp.text;
    annoEl.querySelector('.badge').textContent = kind==="CORRECT"?"CORRECT":"INCORRECT";
    annoEl.className="anno show "+topAnno+" "+(kind==="CORRECT"?"goodbadge":"badbadge");
  } else { annoEl.className="anno "+topAnno; }
  if(!S.scrubbing){ scrub.value = playFrac(); }      // pp-based → thumb glides through dwells
  const si=stepInfo();
  timeEl.textContent = si.total ? `${si.cur} / ${si.total}` : "—";
}
// current stage / total stages (a "stage" is a pause); cur = stages reached so far (min 1)
function stepInfo(){
  if(!S.comp || !S.comp.pauses.length) return {cur:0,total:0};
  let cur=0; for(const p of S.comp.pauses) if(p.t<=S.t+EPS) cur++;
  return {cur:Math.max(1,cur), total:S.comp.pauses.length};
}

/* ========================================================== UI ============== */
const debugPanel=document.getElementById('debugPanel');
const termlist=document.getElementById('termlist');
const tabsEl=document.getElementById('tabs');
const descEl=document.getElementById('desc');
const nameEl=document.getElementById('termName');
const defEl=document.getElementById('termDef');
const playBtn=document.getElementById('play');
const scrub=document.getElementById('scrub');
const timeEl=document.getElementById('time');
const speed=document.getElementById('speed');
const speedVal=document.getElementById('speedVal');
const search=document.getElementById('search');
const termSelect=document.getElementById('termSelect');
const GROUP_ORDER=["Defending","Attacking"];

function buildTermList(filter=""){
  termlist.innerHTML="";
  const groups={};
  for(const t of TERMS){ if(filter && !t.name.toLowerCase().includes(filter.toLowerCase())) continue;
    (groups[t.group]=groups[t.group]||[]).push(t); }
  for(const g of GROUP_ORDER){
    if(!groups[g]) continue;
    const h=document.createElement('div'); h.className="grouphdr"; h.textContent=g; termlist.appendChild(h);
    for(const t of groups[g]){
      const b=document.createElement('button'); b.className="termbtn"+(S.term&&S.term.id===t.id?" active":"");
      b.dataset.id=t.id; b.textContent=t.name;
      b.onclick=()=>selectTerm(t);
      termlist.appendChild(b);
    }
  }
}
// mobile dropdown: grouped <optgroup>, built once
function buildTermSelect(){
  termSelect.innerHTML="";
  const groups={};
  for(const t of TERMS) (groups[t.group]=groups[t.group]||[]).push(t);
  for(const g of GROUP_ORDER){
    if(!groups[g]) continue;
    const og=document.createElement('optgroup'); og.label=g;
    for(const t of groups[g]){ const o=document.createElement('option'); o.value=t.id; o.textContent=t.name; og.appendChild(o); }
    termSelect.appendChild(og);
  }
  termSelect.onchange=()=>{ const t=TERMS.find(x=>x.id===termSelect.value); if(t) selectTerm(t); };
}
function selectTerm(t){
  nameEl.textContent=t.name; defEl.textContent=t.def;
  loadVariant(t,0);
  for(const b of termlist.querySelectorAll('.termbtn')) b.classList.toggle('active', b.dataset.id===t.id);
  if(termSelect.value!==t.id) termSelect.value=t.id;
}
function buildTabs(){
  tabsEl.innerHTML="";
  S.term.variants.forEach((v,i)=>{
    const b=document.createElement('button');
    const good=v.kind==="CORRECT";
    b.className="tab "+(good?"good":"bad")+(i===S.vIndex?" active":"");
    b.innerHTML=`<span class="dot" style="background:${good?"var(--good)":"var(--bad)"}"></span>${v.kind==="CORRECT"?"Correct":"Incorrect"} — ${v.title}`;
    b.onclick=()=>loadVariant(S.term,i);
    tabsEl.appendChild(b);
  });
}
function updateDesc(){
  const v=S.term.variants[S.vIndex];
  descEl.innerHTML=`<span class="vtitle">${v.kind==="CORRECT"?"✔ ":"✖ "}${v.title}.</span>${v.desc}`;
}
function updatePlayBtn(){ playBtn.textContent = S.playing? "⏸":"▶"; }
// paint orange stage markers (the Forward/Back jump points) onto the scrub track
function setScrubTicks(){
  if(!S.comp) return;
  const marks=S.comp.pauses.map(p=>(tToPp(S.comp,p.t)/S.comp.ppTotal)*100).sort((a,b)=>a-b);
  const w=0.7;                                  // half-width of each tick, %
  let g='linear-gradient(90deg', cur=0;
  for(const m of marks){
    const a=Math.max(0,m-w), b=Math.min(100,m+w);
    if(a<cur) continue;
    g+=`,#2a3a4d ${cur}%,#2a3a4d ${a}%,#f0a32a ${a}%,#f0a32a ${b}%`;
    cur=b;
  }
  g+=`,#2a3a4d ${cur}%,#2a3a4d 100%)`;
  scrub.style.background=g;
}

/* events */
playBtn.onclick=togglePlay;
document.getElementById('restart').onclick=()=>{ S.t=0; S.pp=0; S.playing=false; S.seekTarget=null; S.debugPos={}; updatePlayBtn(); render(); };
document.getElementById('prevStage').onclick=prevStage;
document.getElementById('nextStage').onclick=nextStage;

/* hidden debug mode: Shift+D toggles. When on and paused, drag circles to read/relay positions. */
function setDebug(on){ S.debug=!!on; stageEl.classList.toggle('debug',S.debug); if(!S.debug){ S.dragging=false; S.debugPos={}; } render(); }
function entityAtCanvas(cx,cy){
  const R=Math.max(11,rect.w*0.036), lim=(R*1.4)**2; let best=null,bd=lim;
  for(const e of S.comp.entities){
    const p=samplePos(S.comp,e.id,S.t), c=project(p[0],p[1]);
    const d=(c[0]-cx)**2+(c[1]-cy)**2; if(d<=bd){ bd=d; best=e.id; }
  }
  return best;
}
cv.addEventListener('pointerdown',e=>{
  if(!S.debug) return;
  const id=entityAtCanvas(e.offsetX,e.offsetY);
  if(id){ S.sel=id; if(!S.playing){ S.dragging=true; try{cv.setPointerCapture(e.pointerId);}catch(_){} } render(); }
});
cv.addEventListener('pointermove',e=>{
  if(!S.debug||!S.dragging) return;
  S.debugPos[S.sel]=invProject(e.offsetX,e.offsetY); render();
});
cv.addEventListener('pointerup',e=>{ if(S.dragging){ S.dragging=false; try{cv.releasePointerCapture(e.pointerId);}catch(_){} } });
scrub.addEventListener('pointerdown',()=>S.scrubbing=true);
scrub.addEventListener('pointerup',()=>S.scrubbing=false);
scrub.addEventListener('input',()=>{ seekFraction(parseFloat(scrub.value)); updatePlayBtn(); render(); });
scrub.addEventListener('change',()=>{ S.scrubbing=false; });
speed.addEventListener('input',()=>{ S.speed=parseFloat(speed.value); speedVal.textContent=S.speed.toFixed(2).replace(/0$/,'')+"×"; });
search.addEventListener('input',()=>buildTermList(search.value));

/* team-colour pickers */
const colUs=document.getElementById('colUs'), colThem=document.getElementById('colThem');
function syncPickers(){ colUs.value=S.colors.us; colThem.value=S.colors.them; }
colUs.addEventListener('input',()=>{ S.colors.us=colUs.value; saveColors(); buildTermList(search.value); render(); });
colThem.addEventListener('input',()=>{ S.colors.them=colThem.value; saveColors(); render(); });

document.addEventListener('keydown',e=>{
  if(e.target.tagName==="INPUT") return;
  if(e.key==="D"){ e.preventDefault(); setDebug(!S.debug); }      // Shift+D: hidden debug toggle
  else if(e.code==="Space"){ e.preventDefault(); togglePlay(); }
  else if(e.key==="ArrowRight"){ e.preventDefault(); nextStage(); }
  else if(e.key==="ArrowLeft"){ e.preventDefault(); prevStage(); }
});

new ResizeObserver(resize).observe(stageEl);
window.addEventListener('resize',resize);

function frame(now){
  if(S.lastNow==null) S.lastNow=now;
  let dt=(now-S.lastNow)/1000; S.lastNow=now;
  dt=Math.min(dt,0.05);
  tick(dt);
  render();
  requestAnimationFrame(frame);
}

/* ---- test/debug surface: expose the engine so the headless harness can drive it,
        and support deep-links like #term=press&v=1&t=2.4&play ---- */
window.OVFC = {
  TERMS, get S(){return S;}, compileVariant, samplePos, pauseAt, tick, seekFraction,
  play, pause, nextStage, prevStage, loadVariant, render, stepInfo, playFrac, sampleFace, FOCUS,
  setDebug, seqNumber, invProject, debugPanelText(){ return debugPanel.textContent; },
  canvasPointOf(id){ const p=samplePos(S.comp,id,S.t); return project(p[0],p[1]); },
  // drive the clock deterministically without rAF (for tests); honours the auto-cycle model
  step(dt){ tick(dt); render(); },
  // current positions of every entity, plus clock info — what tests assert on
  snapshot(){
    const ents={};
    for(const e of S.comp.entities){ const p=samplePos(S.comp,e.id,S.t); ents[e.id]=p; }
    return { termId:S.term.id, vIndex:S.vIndex, kind:S.term.variants[S.vIndex].kind,
      t:S.t, duration:S.comp.duration, playing:S.playing,
      activePause: (pauseAt(S.comp,S.t)||{}).text||null, entities:ents };
  },
  selectById(id, v){ const t=TERMS.find(x=>x.id===id); if(t){ selectTerm(t); if(v!=null) loadVariant(t,v); } },
  // resolve the rendered colour of an entity in any term/variant (used by colour tests)
  entityColorFor(termId, vIndex, entityId){
    const t=TERMS.find(x=>x.id===termId); const v=t.variants[vIndex];
    const e=v.entities.find(x=>x.id===entityId);
    const us = e.team === (t.orientation==="attacking" ? "red" : "blue");
    return us ? S.colors.us : S.colors.them;
  }
};
function applyHash(){
  const h=new URLSearchParams(location.hash.slice(1));
  if(h.has('term')){ const t=TERMS.find(x=>x.id===h.get('term')); if(t) selectTerm(t); }
  if(h.has('v')) loadVariant(S.term, parseInt(h.get('v'))||0);
  if(h.has('t')){ S.t=parseFloat(h.get('t'))||0; S.pp=tToPp(S.comp,S.t); render(); }
  if(h.has('debug')) setDebug(true);
  if(h.has('play')) play();
}
window.addEventListener('hashchange',applyHash);

/* boot */
syncPickers();
buildTermList();
buildTermSelect();
selectTerm(TERMS[0]);
resize();
speedVal.textContent="1×";
applyHash();
requestAnimationFrame(frame);
</script>
</body>
</html>
